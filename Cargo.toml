[package]
name = "prowl"
version = "0.1.0"
edition = "2024"
description = "Watch a repo's merge queue and your open PRs as colored tables; refresh on an interval and ring the terminal bell when anything changes."
license = "MIT"

[[bin]]
name = "prowl"
path = "src/main.rs"

[dependencies]
anstyle = "1.0.14"
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
notify-rust = { version = "4.18.0", optional = true }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
unicode-width = "0.2.2"

[features]
notify = ["dep:notify-rust"]
